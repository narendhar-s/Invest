services:
  postgres:
    image: postgres:16-alpine
    container_name: stockwise_postgres
    environment:
      POSTGRES_USER: stockwise
      POSTGRES_PASSWORD: stockwise123
      POSTGRES_DB: stockwise_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockwise -d stockwise_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stockwise_app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: stockwise
      DATABASE_PASSWORD: stockwise123
      DATABASE_NAME: stockwise_db
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres_data:
