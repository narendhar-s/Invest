      - BHARTIARTL.NS
      - ITC.NS
      - KOTAKBANK.NS
      - LT.NS
      - AXISBANK.NS
      - ASIANPAINT.NS
      - MARUTI.NS
      - TITAN.NS
      - BAJFINANCE.NS
      - WIPRO.NS
      - HCLTECH.NS
      - ULTRACEMCO.NS
      - NESTLEIND.NS
      - SUNPHARMA.NS
      - ONGC.NS
      - NTPC.NS
      - POWERGRID.NS
      - ADANIENT.NS
    indices:
      - "^NSEI"
      - "^NSEBANK"

  us:
